# Render Blueprint — https://dashboard.render.com/blueprint
# Repo: https://github.com/shaad459/tradescharge

services:
  - type: web
    name: tradescharge
    runtime: docker
    repo: https://github.com/shaad459/tradescharge
    branch: main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "true"
      - key: PORT
        value: "8000"
      - key: COOKIE_SECURE
        value: "true"
      - key: KITE_DEBUG_ROUTES
        value: "0"
      - key: KITE_AUDIT_LOG
        value: "0"
      # Required at first Blueprint apply (dashboard prompts for sync: false):
      - key: KITE_API_KEY
        sync: false
      - key: KITE_API_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
